name: CI
on:
  pull_request_target:
    types: [opened]

permissions: write-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run
        run: echo "PR title is ${{ github.event.pull_request.title }}"
      - uses: random-org/some-action@main
